            <span class="material-symbols-outlined text-rose-700">list_alt</span>

            <iframe id="iframe-istanbul" class="absolute inset-0 w-full h-full z-10 hidden" src="https://docs.google.com/spreadsheets/d/1jCmpMeKOKlOro0yWJ7JXFI4QWi35mAXNSPomI6TO4vc/edit?rm=minimal" frameborder="0" allowfullscreen></iframe>

</main>

<script>
    const titles = {
        nisan: 'Nişan Katılımcıları',
        izmir: 'İzmir Düğün Katılımcıları',
        istanbul: 'İstanbul Düğün Katılımcıları'
    };

    function switchSheet(target) {
        ['nisan', 'izmir', 'istanbul'].forEach(id => {
            document.getElementById('iframe-' + id).classList.add('hidden');
            const btn = document.getElementById('btn-' + id);
            btn.classList.remove('bg-white', 'text-primary', 'shadow-sm');
            btn.classList.add('text-on-surface-variant');
        });
        document.getElementById('iframe-' + target).classList.remove('hidden');
        const activeBtn = document.getElementById('btn-' + target);
        activeBtn.classList.add('bg-white', 'text-primary', 'shadow-sm');
        activeBtn.classList.remove('text-on-surface-variant');
        document.getElementById('sheet-title').textContent = titles[target];
    }
</script>
