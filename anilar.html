<!DOCTYPE html>

<html class="light" lang="tr"><head>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

        theme: {

              "on-primary": "#fff7f7",
              "on-tertiary": "#fff8ef",
              "background": "#fdf8f8",
              "primary-container": "#fcabb9",
              "surface-container-high": "#ece7e7",
              "secondary-container": "#e3f7d4",
              "surface-container-highest": "#e6e1e2",
              "tertiary-fixed-dim": "#e6c047",
              "on-tertiary-fixed-variant": "#634e00",
              "secondary": "#526449",
              "on-secondary-fixed-variant": "#58694e",
              "tertiary-container": "#f5ce53",
              "surface-container-lowest": "#ffffff",
              "on-tertiary-container": "#584500",
              "error": "#ac3434",
              "on-error-container": "#65000b",
              "error-container": "#f56965",
              "on-surface": "#343233",
              "surface-bright": "#fdf8f8",
              "inverse-on-surface": "#9f9c9c",
              "secondary-dim": "#47583e",
              "on-primary-container": "#632a37",
              "tertiary": "#745c00",
              "primary-dim": "#7e404d",
              "outline": "#7d7a7a",
              "on-secondary-container": "#4e5f44",
              "inverse-primary": "#fcabb9",
              "surface-container-low": "#f7f2f2",
              "primary-fixed-dim": "#ec9eac",
              "surface-tint": "#8c4c59",
              "surface-container": "#f2eded",
              "error-dim": "#70030f",
              "primary": "#8c4c59",
              "on-secondary": "#ecffdd",
              "tertiary-dim": "#665100",
              "on-surface-variant": "#615e5f",
              "surface-dim": "#ded9d9",
              "inverse-surface": "#0f0e0e",
              "on-secondary-fixed": "#3c4d33",
              "tertiary-fixed": "#f5ce53",
              "secondary-fixed": "#e3f7d4",
              "on-primary-fixed-variant": "#6d3340",
              "surface-variant": "#e6e1e2",
              "on-tertiary-fixed": "#413200",

              "on-background": "#343233"

            fontFamily: {
              "headline": ["Noto Serif"],
              "body": ["Plus Jakarta Sans"],

            },

<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fdf8f8; color: #343233; -webkit-font-smoothing: antialiased; }
        .font-serif { font-family: 'Noto Serif', serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .tonal-transition { background: linear-gradient(to bottom, #fdf8f8, #f2eded); }
        .glass-card { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }

        /* Progress bar */
        #progressBarWrap {
            width: 100%;
            background: #e6e1e2;
            border-radius: 9999px;
            height: 10px;
            overflow: hidden;
            margin-top: 16px;
        }
        #progressBarFill {
            height: 100%;
            width: 0%;
            border-radius: 9999px;
            background: linear-gradient(to right, #8c4c59, #ec9eac);
            transition: width 0.3s ease;
        }
        #progressLabel {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #8c4c59;
            margin-top: 8px;
            text-align: center;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface selection:bg-primary-container selection:text-on-primary-container">
<!-- Top Navigation Shell -->
<nav class="fixed top-0 w-full z-50 bg-white/70 backdrop-blur-md flex justify-between items-center px-6 py-4 shadow-sm">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-rose-800" data-icon="favorite">favorite</span>
<span class="text-2xl font-serif italic text-rose-800">G &amp; E</span>
</div>
<button class="text-zinc-500">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
</nav>

<main class="pb-8 pt-24 px-6 flex flex-col justify-center items-center mt-10">
    <div class="max-w-md w-full text-center space-y-10">
        <div class="space-y-4">
            <h1 class="text-4xl font-serif text-on-surface">Anılarınızı Paylaşın</h1>
            <p class="text-[10px] uppercase tracking-[0.3em] font-bold text-primary">BİZİMLE ANI PAYLAŞIN</p>
        </div>

        <!-- Yükleme Kapsayıcısı -->
        <div class="bg-surface-container-highest rounded-3xl p-10 shadow-lg relative overflow-hidden mt-6">
            <div class="absolute inset-0 bg-gradient-to-br from-primary/10 to-transparent pointer-events-none"></div>
            
            <span id="uploadIcon" class="material-symbols-outlined text-primary text-6xl mb-4 relative z-10 transition-all font-light" data-icon="add_photo_alternate" style="font-size: 64px;">add_photo_alternate</span>
            <h2 id="uploadTitle" class="text-2xl font-serif text-on-surface mb-2 relative z-10 transition-all">Anı Yükle</h2>
            <p id="uploadText" class="text-sm text-on-surface-variant mb-8 relative z-10 px-2 transition-all">Bugün ile ilgili çektiğiniz fotoğraf ve videoları bize göndererek bu özel günümüzü ölümsüzleştirmemize yardımcı olun.</p>
            
            <label id="uploadLabel" class="relative z-10 flex w-full py-5 rounded-full bg-gradient-to-r from-primary to-primary-dim text-on-primary font-extrabold text-lg shadow-xl shadow-primary/30 hover:scale-[1.02] active:scale-95 transition-all cursor-pointer items-center justify-center gap-2">
                <span class="material-symbols-outlined" data-icon="photo_camera">photo_camera</span>
                Fotoğraf / Video Seç
                <input type="file" id="fileInput" class="hidden" accept="image/*,video/*,image/heic,image/heif" multiple />
            </label>
            
            <!-- Progress Bar -->
            <div id="progressBarWrap" class="hidden">
                <div id="progressBarFill"></div>
            </div>
            <div id="progressLabel" class="hidden"></div>
        </div>
    </div>
</main>

<div class="mt-8 text-center space-y-4 pb-20">
<p class="font-serif italic text-2xl text-rose-800/60">G &amp; E</p>
<p class="text-[10px] uppercase tracking-[0.4em] font-bold text-zinc-400">Ebedi Bir Mutluluğa Doğru</p>
</div>

<!-- Bottom Navigation Shell -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-white/80 backdrop-blur-xl z-50 rounded-t-[3rem] shadow-[0_-4px_24px_rgba(140,76,89,0.06)]">
<!-- Anı Paylaş - Active -->
<a class="flex flex-col items-center justify-center bg-rose-100 text-rose-900 rounded-full px-6 py-2 transition-all scale-90 duration-200 ease-out" href="#">
<span class="material-symbols-outlined" data-icon="cloud_upload">cloud_upload</span>
<span class="text-[10px] font-sans font-semibold tracking-tighter">Anı Paylaş</span>
</a>
</nav>

<script>
document.getElementById('fileInput').addEventListener('change', async function(e) {
    const files = e.target.files;
    if (files.length === 0) return;
    
    const uploadTitle = document.getElementById('uploadTitle');
    const uploadText = document.getElementById('uploadText');
    const uploadIcon = document.getElementById('uploadIcon');
    const uploadLabel = document.getElementById('uploadLabel');
    const progressBarWrap = document.getElementById('progressBarWrap');
    const progressBarFill = document.getElementById('progressBarFill');
    const progressLabel = document.getElementById('progressLabel');
    
    // UI: yükleme başladı
    uploadIcon.innerText = 'hourglass_empty';
    uploadTitle.innerText = "Yükleniyor...";
    uploadText.innerText = "Lütfen sayfadan ayrılmayın, dosyalarınız yükleniyor.";
    uploadLabel.style.pointerEvents = 'none';
    uploadLabel.style.opacity = '0.6';

    progressBarWrap.classList.remove('hidden');
    progressLabel.classList.remove('hidden');
    
    const scriptURL = "https://script.google.com/macros/s/AKfycbzWtgV3JCkCamnAO4jvVhklpY6JFBPZP-HfEKh6ZFUiCQprY5rWBMQE3encm4LyeMPUTA/exec";
    
    let successCount = 0;
    
    for (let i = 0; i < files.length; i++) {
        const file = files[i];
        const percent = Math.round(((i) / files.length) * 100);
        progressBarFill.style.width = percent + '%';
        progressLabel.innerText = (i + 1) + ' / ' + files.length + ' dosya yükleniyor...';

        await new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = async function() {
                const base64 = reader.result.split(',')[1];
                try {
                    await fetch(scriptURL, {
                        method: "POST",
                        headers: {"Content-Type": "application/x-www-form-urlencoded"},
                        body: "filename=" + encodeURIComponent(file.name) + "&mimetype=" + encodeURIComponent(file.type) + "&data=" + encodeURIComponent(base64)
                    });
                    successCount++;
                } catch(err) {
                    console.error(err);
                }
                resolve();
            };
            reader.readAsDataURL(file);
        });
    }

    // %100'e tamamla
    progressBarFill.style.width = '100%';
    progressLabel.innerText = 'Tamamlandı!';

    setTimeout(() => {
        progressBarWrap.classList.add('hidden');
        progressLabel.classList.add('hidden');

        if (successCount > 0) {
            uploadIcon.innerText = 'check_circle';
            uploadIcon.classList.add('text-rose-600');
            uploadTitle.innerText = successCount + " Dosya Yüklendi! 😍";
            uploadText.innerText = "Teşekkürler! Anılarınız bizimle sonsuza dek kalacak.";
        } else {
            uploadIcon.innerText = 'error';
            uploadTitle.innerText = "Yükleme Başarısız 😔";
            uploadText.innerText = "Bir sorun oluştu, lütfen tekrar deneyin.";
        }

        uploadLabel.style.pointerEvents = 'auto';
        uploadLabel.style.opacity = '1';
        
        // 5 saniye sonra sıfırla
        setTimeout(() => {
            uploadIcon.innerText = 'add_photo_alternate';
            uploadIcon.classList.remove('text-rose-600');
            uploadTitle.innerText = "Anı Yükle";
            uploadText.innerText = "Bugün ile ilgili çektiğiniz fotoğraf ve videoları bize göndererek bu özel günümüzü ölümsüzleştirmemize yardımcı olun.";
            progressBarFill.style.width = '0%';
            document.getElementById('fileInput').value = "";
        }, 5000);
    }, 600);
});
</script>

</body></html>
